# watch-local — on-demand workers for the /watch skill.
#
# Both services use `restart: no` and are invoked via `docker compose run --rm`
# from scripts/watch.ps1. Nothing runs continuously.
#
# Bind mounts (set per-job by the launcher):
#   /work     → host job dir (frames, transcripts, intermediate.json land here)
#   /input    → host dir containing the source video (read-only, local files only)
#   /models   → host model cache (faster-whisper large-v3 lives here)
#   /app      → worker scripts (read-only)

services:

  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: watch-local/tools:1
    container_name: watch-local-tools
    # CPU only — no GPU, no CUDA. Keeps image small (~200 MB) and rebuilds
    # fast when yt-dlp needs an update.
    restart: "no"

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    image: watch-local/whisper:cu128
    container_name: watch-local-whisper
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/models/hf-cache
    restart: "no"

  # CPU-only whisper variant. Built INSTEAD of `whisper` when GPU detection
  # finds no usable NVIDIA GPU (setup.ps1 picks the service). The launcher
  # passes W_DEVICE=cpu / W_COMPUTE=int8 at run time.
  whisper-cpu:
    build:
      context: .
      dockerfile: Dockerfile.whisper-cpu
    image: watch-local/whisper:cpu
    container_name: watch-local-whisper-cpu
    environment:
      - HF_HOME=/models/hf-cache
    restart: "no"
