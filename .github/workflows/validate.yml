name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

# Least privilege: nothing here writes to the repo. Third-party code runs
# in these jobs (npm/pip/PSGallery installs), so the default token scope
# must not include contents:write.
permissions:
  contents: read

jobs:
  claude-validate:
    name: claude plugin validate (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace
        run: claude plugin validate --strict .

      - name: Validate plugin
        run: claude plugin validate --strict ./plugins/watch-local

  unit-tests:
    name: unit tests (${{ matrix.os }} / ${{ matrix.engine }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # All launcher engines: Windows PowerShell 5.1 (the Windows
        # default), pwsh on Windows, and pwsh on Linux. Child-process
        # tests follow the invoking engine, so each matrix leg exercises
        # the whole unit layer on that engine/OS.
        include:
          - os: windows-latest
            engine: powershell
          - os: windows-latest
            engine: pwsh
          - os: ubuntu-latest
            engine: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install pytest

      # `shell:` does not accept expressions, so each engine gets its own
      # pair of steps gated by `if:`. The install must run IN the target
      # engine -- 5.1 and pwsh use different module paths.
      - name: Install Pester 5 (powershell)
        if: matrix.engine == 'powershell'
        shell: powershell
        run: |
          Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
          Install-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.99 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install Pester 5 (pwsh)
        if: matrix.engine == 'pwsh'
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.99 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run unit suite (powershell)
        if: matrix.engine == 'powershell'
        shell: powershell
        run: ./tests/run-tests.ps1 -Unit

      - name: Run unit suite (pwsh)
        if: matrix.engine == 'pwsh'
        shell: pwsh
        run: ./tests/run-tests.ps1 -Unit

  ci-validators:
    name: Python validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install "pyyaml>=6"

      - name: Validate marketplace.json
        run: python scripts/ci/validate_marketplace.py

      - name: Validate plugin manifests
        run: python scripts/ci/validate_plugins.py

      - name: Validate SKILL.md frontmatter
        run: python scripts/ci/validate_skills.py

      - name: Safety-scan prompt-facing Markdown
        run: python scripts/ci/check_skill_safety.py

      - name: Check for private contact info
        run: python scripts/ci/check_no_private_contact.py
