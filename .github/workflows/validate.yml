name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  claude-validate:
    name: claude plugin validate (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace
        run: claude plugin validate --strict .

      - name: Validate plugin
        run: claude plugin validate --strict ./plugins/watch-local

  ci-validators:
    name: Python validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install "pyyaml>=6"

      - name: Validate marketplace.json
        run: python scripts/ci/validate_marketplace.py

      - name: Validate plugin manifests
        run: python scripts/ci/validate_plugins.py

      - name: Validate SKILL.md frontmatter
        run: python scripts/ci/validate_skills.py

      - name: Safety-scan prompt-facing Markdown
        run: python scripts/ci/check_skill_safety.py

      - name: Check for private contact info
        run: python scripts/ci/check_no_private_contact.py
