name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  claude-validate:
    name: claude plugin validate (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace
        run: claude plugin validate --strict .

      - name: Validate plugin
        run: claude plugin validate --strict ./plugins/watch-local

  unit-tests:
    name: unit tests (${{ matrix.os }} / ${{ matrix.engine }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # All launcher engines: Windows PowerShell 5.1 (the Windows
        # default), pwsh on Windows, and pwsh on Linux. Child-process
        # tests follow the invoking engine, so each matrix leg exercises
        # the whole unit layer on that engine/OS.
        include:
          - os: windows-latest
            engine: powershell
          - os: windows-latest
            engine: pwsh
          - os: ubuntu-latest
            engine: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install pytest

      - name: Install Pester 5
        shell: ${{ matrix.engine }}
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 6) {
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
          }
          Install-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.99 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run unit suite
        shell: ${{ matrix.engine }}
        run: ./tests/run-tests.ps1 -Unit

  ci-validators:
    name: Python validators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install "pyyaml>=6"

      - name: Validate marketplace.json
        run: python scripts/ci/validate_marketplace.py

      - name: Validate plugin manifests
        run: python scripts/ci/validate_plugins.py

      - name: Validate SKILL.md frontmatter
        run: python scripts/ci/validate_skills.py

      - name: Safety-scan prompt-facing Markdown
        run: python scripts/ci/check_skill_safety.py

      - name: Check for private contact info
        run: python scripts/ci/check_no_private_contact.py
